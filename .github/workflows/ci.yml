name: TStack CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -vv --tb=short --junitxml=pytest-${{ matrix.python-version }}.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.xml
          if-no-files-found: warn

      - name: Smoke-test CLI
        run: |
          tstack --version
          tstack list
          tstack architect --output /tmp/architect.md
          test -s /tmp/architect.md
          tstackd --help
          tstackd capabilities > /tmp/capabilities.json
          test -s /tmp/capabilities.json
          tstack-sandbox profiles > /tmp/sandbox-profiles.json
          test -s /tmp/sandbox-profiles.json

      - name: Run TStack self-scan
        run: tstack scan . --fail-on review
